{% extends "base.html" %}

{% block title %}Add Product - FRIZZLY Admin{% endblock %}
{% block page_title %}Add New Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="table-card">
            <h5 class="mb-4"><i class="bi bi-plus-circle me-2"></i>Add New Product</h5>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Product Name *</label>
                        <input type="text" class="form-control" name="name" required placeholder="e.g., Fresh Apple" value="{{ product.name if product else '' }}">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Price * (number only)</label>
                        <input type="number" step="0.01" class="form-control" name="price" required placeholder="e.g., 2.99" value="{{ product.price if product else '' }}">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Category *</label>
                        <select class="form-select" name="category" required>
                            <option value="">Select category</option>
                            {% for cat in categories %}
                            <option value="{{ cat.name }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Stock Quantity *</label>
                        <input type="number" class="form-control" name="stock" required placeholder="e.g., 100" min="0" value="0">
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label">Image URL *</label>
                        <input type="url" class="form-control" name="image_url" required placeholder="https://example.com/image.jpg">
                        <small class="text-muted">Enter image URL</small>
                    </div>
                            <strong>OR</strong>
                        </div>
                        <input type="url" class="form-control" name="imageUrl" id="imageUrl" placeholder="https://example.com/image.jpg" value="{{ product.image_url if product else '' }}">
                        <small class="text-muted">Paste image URL (Unsplash, ImgBB, etc.)</small>
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="Product description...">{{ product.description if product else '' }}</textarea>
                    </div>
                    
                    <div class="col-12">
                        <hr>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-gradient">
                                <i class="bi bi-check-circle me-2"></i>Add Product
                            </button>
                            <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
