{% extends "base.html" %}

{% block title %}Edit Product - FRIZZLY Admin{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="table-card">
            <h5 class="mb-4"><i class="bi bi-pencil me-2"></i>Edit Product</h5>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Product Name *</label>
                        <input type="text" class="form-control" name="name" value="{{ product.name }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Price * (number only)</label>
                        <input type="number" step="0.01" class="form-control" name="price" value="{{ product.price }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Category *</label>
                        <select class="form-select" name="category" required>
                            <option value="">Select category</option>
                            {% for cat in categories %}
                            <option value="{{ cat.name }}" {% if product.category == cat.name %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Stock Quantity *</label>
                        <input type="number" class="form-control" name="stock" value="{{ product.stock }}" min="0" required>
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label">Image URL *</label>
                        <input type="url" class="form-control" name="image_url" value="{{ product.image_url }}" placeholder="https://example.com/image.jpg" required>
                        <small class="text-muted">Enter image URL</small>
                        {% if product.image_url %}
                        <div class="mt-2">
                            <img src="{{ product.image_url }}" alt="{{ product.name }}" style="max-width: 200px; max-height: 200px; object-fit: contain;" class="border rounded p-2">
                        </div>
                        {% endif %}
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3">{{ product.description }}</textarea>
                    </div>
                    
                    <div class="col-12">
                        <hr>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-gradient">
                                <i class="bi bi-check-circle me-2"></i>Update Product
                            </button>
                            <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
